      url: "/files/papers/risky_steady_state_1.pdf"
    - label: "Occasionally binding constraints"
      type: paper
      url: "#"

- id: financial-integration
  title: "Financial Integration and Growth in a Risky World"
  coauthors: "Hélène Rey and Nicolas Coeurdacier"
  journal: "Journal of Monetary Economics"
  year: 2019
  url: "/files/papers/financial_integration.pdf"
  abstract: "We study how financial integration affects growth and welfare in a world with aggregate risk — showing that integration can reduce growth when it amplifies risk sharing distortions."
  long_description: |
    Standard theory predicts financial integration raises welfare through better
    risk sharing. We show this is **conditional on relative risk aversion**:

    *E[r&#x1D464;] ↑ via integration → welfare ↑ or ↓ as σ ⋛ σ\**

    When risk aversion is high, integration can *reduce* welfare by amplifying
    precautionary saving motives and distorting capital allocation. The paper
    reconciles the mixed empirical evidence on integration and growth with a
    model that takes uncertainty seriously.
  related:
