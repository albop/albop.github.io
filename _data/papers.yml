- id: risky-steady-state
  title: "The Risky Steady-State"
  coauthors: "Helene Rey and Nicolas Coeurdacier"
  journal: "American Economic Review, Papers and Proceedings"
  year: 2011
  url: "/files/papers/risky_steady_state_1.pdf"
  abstract: "In models with uncertainty, the ergodic mean of endogenous variables differs from the deterministic steady state. We characterize this 'risky steady state' and its uses as an approximation point."
