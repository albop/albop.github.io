- id: back-in-time
  title: "Back in Time. Fast. Accelerated Time Iteration."
  journal: "Journal of Economic Dynamics and Control"
  year: 2026
  url: "/files/papers/accelerated_time_iteration.pdf"
  abstract: "A fast algorithm for solving dynamic models using accelerated time iteration — substantially reducing computation time for standard economic models while maintaining accuracy."
  long_description: |
    Time iteration solves the Bellman equation **directly on the policy space**
    rather than approximating the value function, avoiding a source of error.

    \[ V(k) = \max_{c} \left\{ u(c) + \beta \cdot \mathbb{E}[V(k')] \right\} \]

    The accelerated variant applies a Newton-type update at each iteration,
    achieving **superlinear convergence** — the number of iterations to a
    given tolerance falls dramatically compared to standard time iteration,
    making it competitive with perturbation methods on accuracy while remaining
    globally valid.
  related:
