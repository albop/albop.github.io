- id: larch
  title: "A LARCH(∞) Vector Valued Process"
  coauthors: "Paul Doukhan and Gilles Teyssière"
  journal: "Lecture Notes in Statistics, 187, Springer"
  year: 2006
  url: "/files/papers/dwt1.pdf"
  abstract: "We introduce a vector version of the ARCH(∞) equation yielding a simple approach to various models like bilinear or GARCH models. To this aim we provide an explicit chaotic expansion of a solution for this ARCH(∞) equation, and show the uniqueness of this solution under reasonable conditions. Independent or N -Markov approximations of this process allow to simulate their trajectory or to derive bounds for their weak dependence coefficients as defined by Doukhan and Louhichi (1999). We finally consider a long range dependent version of this model; in this case we provide an existence and uniqueness result."

  type: "Paper"
