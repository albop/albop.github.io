- id: stochastic-lower-bound
  title: "The Stochastic Lower Bound"
  coauthors: "Riccardo Masolo"
  journal: "Economics Letters"
  year: 2019
  url: "/files/papers/slb.pdf"
  abstract: "Since the Great Recession policy rates have been extremely low, but neither absolutely constant, nor exactly set to zero. We thus augment a standard zero lower bound model to study the effects of a stochastic lower bound (SLB) on policy rates. We find that a less predictable SLB helps keep inflation closer to target by lowering expectations of future values of the SLB when interest rate cuts are not an option. Key words: Zero lower bound, DSGE."
  long_description: "Since the Great Recession policy rates have been extremely low, but neither absolutely constant, nor exactly set to zero. We thus augment a standard zero lower bound model to study the effects of a stochastic lower bound (SLB) on policy rates. We find that a less predictable SLB helps keep inflation closer to target by lowering expectations of future values of the SLB when interest rate cuts are not an option. Key words: Zero lower bound, DSGE."

