- id: stochastic-lower-bound
  title: "The Stochastic Lower Bound"
  coauthors: "Riccardo Masolo"
  journal: "Economics Letters"
  year: 2019
  url: "/files/papers/slb.pdf"
  abstract: "We derive a lower bound on interest rates that accounts for uncertainty, showing it differs substantially from the deterministic case — with implications for monetary policy analysis."
  long_description: |
    The zero lower bound on interest rates is usually studied in **deterministic**
    models. But when uncertainty is present, the effective lower bound is higher:

    *i&#x209C; ≥ ī&#x02E2;&#x1D57;&#x1D52;&#x1D54;&#x02B0; > ī&#x1D30;&#x1D49;&#x1D57;*

    Intuitively, a central bank facing uncertainty needs to keep more room to cut
    rates, raising the effective bound above zero. This has direct implications for
    how often the ZLB binds and how effective unconventional policy needs to be.

    Solved using Dolo's occasionally-binding constraints toolkit.
  related:
    - label: "Dolo (solution method)"
      type: software
      url: "https://github.com/econforge/dolo"
