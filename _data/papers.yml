- id: deep-learning
  title: "Deep Learning for Solving Dynamic Economic Models?"
  coauthors: "Lilia Maliar and Serguei Maliar"
  journal: "Journal of Monetary Economics"
  year: 2021
  url: "https://lmaliar.ws.gc.cuny.edu/files/2021/09/Deep-learning-for-solving-dynamic-economic-models.-_-Elsevier-Enhanced-Reader.pdf"
  abstract: "We compare deep learning to traditional numerical methods for solving dynamic economic models. Standard algorithms remain competitive, but deep learning opens new territory for very high-dimensional problems."
  long_description: |
    Can a neural network replace a numerical solver? We pit deep learning against
    standard algorithms on a battery of dynamic economic models.

    *V(s) ≈ V̂&#x03B8;(s) = NN&#x03B8;(s)*

    **Result:** standard algorithms remain competitive for low-to-medium dimensional
    problems, but deep learning opens genuinely new territory when the state space
    has **10+ dimensions** — a regime where traditional grids and interpolation
    methods break down entirely.

    The paper also provides a framework for benchmarking numerical methods against
    each other, which is now used in Dolo's test suite.
  related:
