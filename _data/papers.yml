- id: capital-outflows
  title: "Managing Capital Outflows with Limited Reserves"
  coauthors: "Suman S. Basu, Atish R. Ghosh and Jonathan D. Ostry"
  journal: "IMF Economic Review"
  year: 2018
  url: "/files/papers/reserves_and_outflows_030817.pdf"
  abstract: "We analyze the optimal intervention policy for an emerging market central bank that wishes to stabilize the exchange rate during a capital outflow episode, but possesses limited reserves. Using a linear-quadratic framework, we show that the zero lower bound on reserves generates a time inconsistency problem. A central bank with full commitment achieves a gradual depreciation to the pure-float level by promising sustained future intervention, such that reserves are exhausted after particularly adverse shocks. A central bank without commitment intervenes little, wishing to preserve some reserves forever, and suffers a larger immediate exchange rate depreciation and associated welfare cost. For more persistent shocks, the time inconsistency problem is greater, and simple intervention rules can achieve welfare gains relative to discretion."
  long_description: "We analyze the optimal intervention policy for an emerging market central bank that wishes to stabilize the exchange rate during a capital outflow episode, but possesses limited reserves. Using a linear-quadratic framework, we show that the zero lower bound on reserves generates a time inconsistency problem. A central bank with full commitment achieves a gradual depreciation to the pure-float level by promising sustained future intervention, such that reserves are exhausted after particularly adverse shocks. A central bank without commitment intervenes little, wishing to preserve some reserves forever, and suffers a larger immediate exchange rate depreciation and associated welfare cost. For more persistent shocks, the time inconsistency problem is greater, and simple intervention rules can achieve welfare gains relative to discretion."

