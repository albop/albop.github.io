- id: risky-steady-state
  title: "The Risky Steady-State"
  coauthors: "Helene Rey and Nicolas Coeurdacier"
  journal: "American Economic Review, Papers and Proceedings"
  year: 2011
  url: "/files/papers/risky_steady_state_1.pdf"
  abstract: "In models with uncertainty, the ergodic mean of endogenous variables differs from the deterministic steady state. We characterize this 'risky steady state' and its uses as an approximation point."
  long_description: |
    In a stochastic model, the long-run average of any variable **differs** from
    its deterministic steady state. We call this the *risky steady state*:

    *x̄&#x02B3;&#x2071;&#x02E2;&#x02B8;&#x02B8; = x̄&#x1D30;&#x1D49;&#x1D57; + ½ σ² · x&#x03C3;&#x03C3; + O(σ⁴)*

    The correction term is **second-order in risk** σ and captures precautionary
    motives — households save more when the future is uncertain, moving the
    economy away from the certainty equivalent. Using the risky steady state as
    the approximation point for perturbation methods substantially improves
    accuracy for moderate-risk economies.
