- id: capital-outflows
  title: "Managing Capital Outflows with Limited Reserves"
  coauthors: "Suman S. Basu, Atish R. Ghosh and Jonathan D. Ostry"
  journal: "IMF Economic Review"
  year: 2018
  url: "/files/papers/reserves_and_outflows_030817.pdf"
  abstract: "A model of optimal capital flow management when foreign reserves are limited. We characterize when capital controls and reserve interventions are complements or substitutes."
  long_description: |
    When a country faces sudden capital outflows, it has two tools: **capital
    controls** (a tax τ on outflows) and **reserve intervention** (selling
    foreign reserves R). When should they be used together?

    *τ\* and R\* are complements when R < R̄*

    When reserves are **scarce** (below threshold R̄), the two instruments
    reinforce each other: using controls preserves reserves for future crises,
    while reserve sales buy time to implement controls. Above the threshold,
    they substitute. The paper provides a full characterization of the optimal
    policy mix as a function of reserve adequacy.
  related:
    - label: "Financial Integration and Growth"
      type: paper
      url: "/files/papers/financial_integration.pdf"
    - label: "The Risky Steady-State"
      type: paper
      url: "/files/papers/risky_steady_state_1.pdf"

- id: inequality-leverage
  title: "Inequality, Leverage and Crises"
  coauthors: "Michael Kumhof and Romain Rancière"
  journal: "American Economic Review"
  year: 2015
  url: "/files/papers/inequalities.pdf"
  abstract: "Rising income inequality leads top earners to lend to bottom earners, increasing leverage and crisis risk. A model linking inequality to the financial crises of 1929 and 2008."
  long_description: |
    A two-agent model in which the income distribution drives financial fragility.
    Top earners accumulate savings they lend to bottom earners — who borrow to
    maintain consumption as their income share falls.

    *σ(y) ↑ → D/Y ↑ → P(crisis) ↑*

    The resulting debt overhang makes the economy fragile: a small shock can tip
    it into a crisis. The mechanism matches the **run-up to 1929 and 2008** —
    both preceded by decades of rising inequality and household leverage.

    Taught in TIE and AE2E6 as a canonical example of how distribution and
    macro-finance interact.
  related:
