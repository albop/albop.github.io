- id: econforge
  name: "EconForge"
  tagline: "Organization"
  description: "GitHub organization hosting a growing collection of open-source tools for quantitative economics, including Dolo, interpolation utilities, and optimization routines."
  url: "https://github.com/econforge"
  long_description: |
    GitHub organization hosting open-source tools for quantitative economics.
    All packages are designed for reproducible, composable model workflows.

    **Key repositories:**

    - **Dolo** — model specification and solution in Python
    - **Dolo.jl** — high-performance Julia port
    - **interpolation.py** — fast multilinear and spline interpolation with python numba

    The goal is to make model code part of the scientific argument —
    readable, shareable, and reusable across projects.
