- id: dolo-python
  name: "Dolo.py"
  tagline: "Python"
  description: "Open-source framework for specifying, solving and simulating economic models. Supports perturbation methods, time iteration, value function iteration, and more."
  url: "https://github.com/econforge/dolo"
  docs: "https://dolo.readthedocs.io"
  long_description: |
    Open-source Python framework for specifying, solving and simulating dynamic economic models.
    Models are written in a readable YAML format; solutions are policy functions that can be
    simulated, plotted, and compared across parameterizations.

    ```python
    from dolo import yaml_import
    from dolo import time_iteration

    model = yaml_import('rbc.yaml')
    dr = time_iteration(model)     
    sim = model.simulate(dr, N=200)
    ```

    Supports perturbation methods (1st and 2nd order), time iteration, value function iteration,
    and — since v0.8 — sparse Jacobians for large heterogeneous-agent models.- label: "Back in Time. Fast. (2026)"

  type: "Software"
  themeIds: ['numerical-methods', 'teaching-computation']
  relatedPaperIds: ['back-in-time', 'deep-learning']
  relatedCourseIds: ['course-ae2e6', 'course-tie']

- id: dolo-julia
  name: "Dolo.jl"
  tagline: "Julia"
  description: "Julia port of Dolo with performance-focused solvers. Enables high-dimensional perturbation methods and faster simulation that are impractical in pure Python."
  url: "https://github.com/econforge/Dolo.jl"
  long_description: |
    Julia port of Dolo with performance-focused solvers. The Julia implementation
    unlocks high-dimensional perturbation methods and faster simulation that are
    impractical in pure Python.

    ```julia
    using Dolo

    model = yaml_import("rbc.yaml")
    dr = time_iteration(model)        # solve
    sim = simulate(model, dr, N=200)  # simulate
    ```

    Shares the same YAML model format as the Python version, so models transfer
    directly. Particularly useful for high-dimensional state spaces and
    heterogeneous-agent models requiring repeated solution.- label: "Dolo (Python)"

  type: "Software"
  themeIds: ['numerical-methods']
  relatedPaperIds: ['back-in-time']
