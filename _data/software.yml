- id: dolo-python
  name: "Dolo.py"
  tagline: "Python"
  description: "Open-source framework for specifying, solving and simulating economic models. Supports perturbation methods, time iteration, value function iteration, and more."
  url: "https://github.com/econforge/dolo"
  docs: "https://dolo.readthedocs.io"
  long_description: |
    Open-source Python framework for specifying, solving and simulating dynamic economic models.
    Models are written in a readable YAML format; solutions are policy functions that can be
    simulated, plotted, and compared across parameterizations.

    ```python
    from dolo import yaml_import
    from dolo import time_iteration

    model = yaml_import('rbc.yaml')
    dr = time_iteration(model)     
    sim = model.simulate(dr, N=200)
    ```

    Supports perturbation methods (1st and 2nd order), time iteration, value function iteration,
    and — since v0.8 — sparse Jacobians for large heterogeneous-agent models.
