- id: occasionally-binding
  title: "Occasionally binding constraints in life-cycle models"
  authors: "with G. Goldschmidt and N. Wonquin"
  type: paper
  date: "Apr 2024"
  url: "#"
  abstract: "Life-cycle models with borrowing limits create kinks in policy functions that standard perturbation methods miss. We develop efficient algorithms that handle these occasionally binding constraints without global methods."
