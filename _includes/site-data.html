<script>
window.SITE_DATA = { items: {
  {% for item in site.data.activity %}{% if item.id %}
  {{ item.id | jsonify }}: {
    type: {{ item.type | jsonify }},
    title: {{ item.title | jsonify }},
    {% if item.abstract %}body: {{ item.abstract | jsonify }},{% endif %}
    {% if item.description %}body: {{ item.description | jsonify }},{% endif %}
    {% if item.authors %}meta: {{ item.authors | jsonify }},{% endif %}
    {% if item.subtitle %}meta: {{ item.subtitle | jsonify }},{% endif %}
    {% if item.url %}url: {{ item.url | jsonify }},{% endif %}
    related: [{% for r in item.related %}{label:{{ r.label | jsonify }},type:{{ r.type | jsonify }},url:{{ r.url | jsonify }}},{% endfor %}]
  },
  {% endif %}{% endfor %}
  {% for item in site.data.projects %}{% if item.id %}
  {{ item.id | jsonify }}: {
    type: "project",
    title: {{ item.title | jsonify }},
    body: {{ item.description | jsonify }},
    url: {{ item.url | jsonify }},
    related: [{% for r in item.related %}{label:{{ r.label | jsonify }},type:{{ r.type | jsonify }},url:{{ r.url | jsonify }}},{% endfor %}]
  },
  {% endif %}{% endfor %}
  {% for item in site.data.questions %}{% if item.id %}
  {{ item.id | jsonify }}: {
    type: "question",
    title: {{ item.question | jsonify }},
    body: {{ item.description | jsonify }},
    related: [{% for r in item.related %}{label:{{ r.label | jsonify }},type:{{ r.type | jsonify }},url:{{ r.url | jsonify }}},{% endfor %}]
  },
  {% endif %}{% endfor %}
  {% for item in site.data.papers %}{% if item.id %}
  {{ item.id | jsonify }}: {
    type: "paper",
    title: {{ item.title | jsonify }},
    {% if item.coauthors %}meta: {{ item.coauthors | jsonify }},{% endif %}
    body: {{ item.abstract | jsonify }},
    {% if item.url %}url: {{ item.url | jsonify }},{% endif %}

    related: [{% for r in item.related %}{label:{{ r.label | jsonify }},type:{{ r.type | jsonify }},url:{{ r.url | jsonify }}},{% endfor %}]
  },
  {% endif %}{% endfor %}
  {% for item in site.data.courses %}{% if item.id %}
  {{ item.id | jsonify }}: {
    type: "teaching",
    title: {{ item.title | jsonify }},
    meta: {{ item.code | jsonify }},
    body: {{ item.description | jsonify }},
    url: {{ item.url | jsonify }},
    related: [{% for r in item.related %}{label:{{ r.label | jsonify }},type:{{ r.type | jsonify }},url:{{ r.url | jsonify }}},{% endfor %}]
  },
  {% endif %}{% endfor %}
  {% for item in site.data.software %}{% if item.id %}
  {{ item.id | jsonify }}: {
    type: "software",
    title: {{ item.name | jsonify }},
    meta: {{ item.tagline | jsonify }},
    body: {{ item.description | jsonify }},
    url: {{ item.url | jsonify }},

    related: [{% for r in item.related %}{label:{{ r.label | jsonify }},type:{{ r.type | jsonify }},url:{{ r.url | jsonify }}},{% endfor %}]
  },
  {% endif %}{% endfor %}
} };
</script>
